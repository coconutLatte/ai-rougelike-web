name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check & build
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Gameplay tests
        run: npm run test

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found — build failed silently"
            exit 1
          fi
          if [ ! -d dist/assets ]; then
            echo "ERROR: dist/assets/ not found — game assets missing"
            exit 1
          fi
          echo "Build output verified: game is deployable"

      - name: Deploy to docs/
        run: |
          # Only overwrite demo files, preserve documentation
          rm -rf docs/assets/ 2>/dev/null || true
          rm -f docs/index.html docs/favicon.svg 2>/dev/null || true
          cp -r dist/* docs/

      - name: Commit and push
        run: |
          git config user.name "Evolution Bot"
          git config user.email "bot@ai-rougelike.dev"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "chore: deploy demo to GitHub Pages"
            git push
          fi
